<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisar Solicitud - CBTIS 199</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: #D4C19C; padding: 2rem; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(78,35,46,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-container { background: white; width: 90%; max-width: 800px; border-radius: 28px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .modal-header { background: linear-gradient(135deg, #621132, #9D2449); padding: 1rem 1.5rem; border-radius: 28px 28px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { color: white; }
        .modal-header button { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid #D4C19C; display: flex; justify-content: flex-end; gap: 1rem; background: #f8f5ed; border-radius: 0 0 28px 28px; }
        
        .info-section { margin-bottom: 1.5rem; border-bottom: 1px solid #D4C19C; padding-bottom: 1rem; }
        .info-section h3 { color: #9D2449; margin-bottom: 1rem; }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .info-item { display: flex; flex-direction: column; gap: 0.3rem; }
        .info-item label { font-size: 0.7rem; font-weight: bold; color: #B38E5D; text-transform: uppercase; }
        .info-item span { font-size: 0.95rem; color: #4E232E; }
        
        .accion-section { background: #f8f5ed; padding: 1rem; border-radius: 16px; margin: 1rem 0; }
        .dias-autorizados { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .dias-autorizados input { width: 80px; padding: 0.4rem; border: 1px solid #D4C19C; border-radius: 8px; text-align: center; }
        textarea { width: 100%; padding: 0.6rem; border: 1px solid #D4C19C; border-radius: 12px; font-family: inherit; resize: vertical; }
        
        .btn { padding: 0.6rem 1.2rem; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #9D2449; color: white; }
        .btn-primary:hover { background: #621132; }
        .btn-danger { background: #621132; color: white; }
        .btn-danger:hover { background: #4E232E; }
        .btn-outline { background: transparent; border: 1px solid #9D2449; color: #9D2449; }
        .btn-outline:hover { background: #9D2449; color: white; }
        
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>

<style>
.sidebar{position:fixed;left:0;top:0;width:250px;height:100vh;background:linear-gradient(180deg,#4b001f,#621132);color:#fff;padding:20px;z-index:999;}
.sidebar h2{margin:0;font-size:28px;}
.sidebar p{color:#d4c19c;margin-bottom:30px;}
.sidebar nav{display:flex;flex-direction:column;gap:12px;}
.sidebar nav a{text-decoration:none;color:white;padding:12px;border-radius:10px;transition:.2s;}
.sidebar nav a:hover{background:#9D2449;}
body{margin-left:250px !important;}
@media(max-width:768px){.sidebar{width:100%;height:auto;position:relative;}body{margin-left:0 !important;}}
</style>
</head>
<body><div class="sidebar">
<div><h2>CBTIS 199</h2><p>ASISTENCIAS</p><nav>
<a href="index.html">📋 Justificantes</a>
<a href="historial.html">📜 Historial por Grupo</a>
<a href="#">📤 Exportar CSV</a>
<a href="configuracion.html">⚙️ Panel Docente</a>
</nav></div>
</div>
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2>📋 Revisar Solicitud #<span id="solicitudId">---</span></h2>
            <button id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="info-section">
                <h3>👨‍🎓 Datos del Alumno</h3>
                <div class="info-grid">
                    <div class="info-item"><label>Nombre</label><span id="alumnoNombre">---</span></div>
                    <div class="info-item"><label>Matrícula</label><span id="alumnoMatricula">---</span></div>
                    <div class="info-item"><label>Grupo</label><span id="alumnoGrupo">---</span></div>
                    <div class="info-item"><label>Tutor</label><span id="alumnoTutor">---</span></div>
                    <div class="info-item"><label>Correo</label><span id="alumnoEmail">---</span></div>
                </div>
            </div>
            
            <div class="info-section">
                <h3>📄 Detalle de la Solicitud</h3>
                <div class="info-grid">
                    <div class="info-item"><label>Motivo</label><span id="solicitudTipo">---</span></div>
                    <div class="info-item"><label>Fecha registro</label><span id="solicitudFecha">---</span></div>
                    <div class="info-item"><label>Período</label><span id="solicitudPeriodo">---</span></div>
                    <div class="info-item"><label>Días</label><span id="solicitudDias">---</span></div>
                    <div class="info-item full-width"><label>Descripción</label><span id="solicitudMotivo">---</span></div>
                </div>
            </div>
            
            <div class="accion-section">
                <h3>⚡ Decisión</h3>
                <div class="dias-autorizados">
                    <label>📅 Días autorizados:</label>
                    <input type="number" id="diasAutorizados" min="0" max="15" value="3">
                    <span>(máx: 15 días)</span>
                </div>
                <div>
                    <label>💬 Comentario oficial:</label>
                    <textarea id="comentarioOficial" rows="2" placeholder="Escribe aquí la justificación..."></textarea>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" id="cancelarBtn">Cancelar</button>
            <button class="btn btn-danger" id="rechazarBtn">❌ Rechazar</button>
            <button class="btn btn-primary" id="aprobarBtn">✅ Aprobar</button>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const solicitudId = urlParams.get('id');
    let solicitudActual = null;
    
    async function cargarDatos() {
        if (!solicitudId) {
            mostrarNotificacion('ID no encontrado', 'error');
            setTimeout(() => window.location.href = 'index.html', 1500);
            return;
        }
        
        const stored = localStorage.getItem('sistemaJustificantes');
        const solicitudes = stored ? JSON.parse(stored) : [];
        solicitudActual = solicitudes.find(s => s.id == solicitudId);
        
        if (!solicitudActual) {
            mostrarNotificacion('Solicitud no encontrada', 'error');
            setTimeout(() => window.location.href = 'index.html', 1500);
            return;
        }
        
        document.getElementById('solicitudId').textContent = solicitudActual.id;
        document.getElementById('alumnoNombre').textContent = solicitudActual.alumno;
        document.getElementById('alumnoMatricula').textContent = solicitudActual.matricula;
        document.getElementById('alumnoGrupo').textContent = `${solicitudActual.grado} ${solicitudActual.grupo}`;
        document.getElementById('alumnoTutor').textContent = solicitudActual.tutor || 'No especificado';
        document.getElementById('alumnoEmail').textContent = solicitudActual.email || '-';
        document.getElementById('solicitudTipo').textContent = solicitudActual.motivo;
        document.getElementById('solicitudFecha').textContent = formatearFechaLarga(solicitudActual.fechaRegistro);
        document.getElementById('solicitudPeriodo').textContent = `${formatearFechaLarga(solicitudActual.fechaInicio)} al ${formatearFechaLarga(solicitudActual.fechaFin)}`;
        document.getElementById('solicitudDias').textContent = `${solicitudActual.dias} días`;
        document.getElementById('solicitudMotivo').textContent = solicitudActual.descripcion || 'Sin descripción';
        document.getElementById('diasAutorizados').value = solicitudActual.dias;
    }
    
    function aprobarSolicitud() {
        const dias = document.getElementById('diasAutorizados').value;
        const comentario = document.getElementById('comentarioOficial').value;
        
        const stored = localStorage.getItem('sistemaJustificantes');
        let solicitudes = stored ? JSON.parse(stored) : [];
        const index = solicitudes.findIndex(s => s.id == solicitudId);
        
        if (index !== -1) {
            solicitudes[index].estado = 'aprobado';
            solicitudes[index].diasAutorizados = dias;
            solicitudes[index].comentarioOficial = comentario;
            localStorage.setItem('sistemaJustificantes', JSON.stringify(solicitudes));
        }
        
        const datosAprobacion = {
            id: solicitudActual.id,
            folio: solicitudActual.folio,
            alumno: { nombre: solicitudActual.alumno, matricula: solicitudActual.matricula, grupo: `${solicitudActual.grado} "${solicitudActual.grupo}"`, email: solicitudActual.email, tutor: solicitudActual.tutor },
            tipo: solicitudActual.motivo,
            periodoAusencia: { inicio: solicitudActual.fechaInicio, fin: solicitudActual.fechaFin },
            diasAutorizados: dias,
            comentario: comentario,
            fechaAprobacion: new Date().toISOString()
        };
        
        sessionStorage.setItem('justificanteAprobado', JSON.stringify(datosAprobacion));
        mostrarNotificacion('✅ Justificante aprobado', 'success');
        setTimeout(() => window.location.href = 'generar-permiso.html', 1000);
    }
    
    function rechazarSolicitud() {
        const comentario = document.getElementById('comentarioOficial').value;
        
        const stored = localStorage.getItem('sistemaJustificantes');
        let solicitudes = stored ? JSON.parse(stored) : [];
        const index = solicitudes.findIndex(s => s.id == solicitudId);
        
        if (index !== -1) {
            solicitudes[index].estado = 'rechazado';
            solicitudes[index].comentarioRechazo = comentario;
            localStorage.setItem('sistemaJustificantes', JSON.stringify(solicitudes));
        }
        
        mostrarNotificacion('❌ Solicitud rechazada', 'error');
        setTimeout(() => window.location.href = 'index.html', 1500);
    }
    
    document.getElementById('closeModalBtn').addEventListener('click', () => window.location.href = 'index.html');
    document.getElementById('cancelarBtn').addEventListener('click', () => window.location.href = 'index.html');
    document.getElementById('aprobarBtn').addEventListener('click', aprobarSolicitud);
    document.getElementById('rechazarBtn').addEventListener('click', rechazarSolicitud);
    
    cargarDatos();
</script>
</body>
</html>
