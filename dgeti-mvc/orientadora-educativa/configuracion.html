<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - CBTIS 199</title>
    <style>
        /* Mismos estilos que index.html más los específicos de configuración */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: #ffffff; padding: 2rem; }
        
        .config-card { max-width: 800px; margin: 0 auto; background: white; border-radius: 28px; padding: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-left: 5px solid #9D2449; }
        h1 { color: #4E232E; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .grupo { margin-bottom: 1.5rem; }
        label { font-weight: bold; display: block; margin-bottom: 0.3rem; color: #4E232E; }
        input, select { width: 100%; padding: 0.7rem; border: 1px solid #D4C19C; border-radius: 16px; transition: all 0.2s; }
        input:focus, select:focus { outline: none; border-color: #9D2449; box-shadow: 0 0 0 2px rgba(157,36,73,0.1); }
        
        .checkbox-group { display: flex; gap: 1rem; align-items: center; margin-top: 0.5rem; flex-wrap: wrap; }
        .checkbox-group label { display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer; }
        .checkbox-group input { width: auto; cursor: pointer; accent-color: #9D2449; }
        
        .tipos-lista { margin: 1rem 0; border-top: 1px solid #D4C19C; padding-top: 1rem; }
        .tipo-item { background: #f8f5ed; padding: 0.8rem; border-radius: 20px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; border-left: 3px solid #B38E5D; }
        .btn-agregar { background: #B38E5D; color: white; border: none; padding: 0.4rem 1rem; border-radius: 30px; cursor: pointer; transition: all 0.2s; }
        .btn-agregar:hover { background: #9D2449; transform: scale(1.02); }
        .btn-guardar { background: #9D2449; color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 40px; cursor: pointer; font-weight: bold; margin-top: 1rem; width: 100%; transition: all 0.2s; }
        .btn-guardar:hover { background: #621132; transform: scale(1.01); }
        .btn-volver { background: #621132; color: white; border: none; padding: 0.5rem 1rem; border-radius: 30px; cursor: pointer; margin-bottom: 1rem; display: inline-block; transition: all 0.2s; }
        .btn-volver:hover { background: #4E232E; transform: scale(1.02); }
        hr { margin: 1rem 0; border-color: #D4C19C; }
        h3 { color: #4E232E; margin-bottom: 0.5rem; }
        .btn-eliminar { background: #621132; color: white; border: none; padding: 0.2rem 0.8rem; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
        .btn-eliminar:hover { background: #4E232E; transform: scale(1.02); }
        
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .config-card { padding: 1rem; }
            .tipo-item { flex-direction: column; align-items: flex-start; }
        }
    </style>

<style>
.sidebar{position:fixed;left:0;top:0;width:250px;height:100vh;background:linear-gradient(180deg,#4b001f,#621132);color:#fff;padding:20px;z-index:999;}
.sidebar h2{margin:0;font-size:28px;}
.sidebar p{color:#d4c19c;margin-bottom:30px;}
.sidebar nav{display:flex;flex-direction:column;gap:12px;}
.sidebar nav a{text-decoration:none;color:white;padding:12px;border-radius:10px;transition:.2s;}
.sidebar nav a:hover{background:#9D2449;}
body{margin-left:250px !important;}
@media(max-width:768px){.sidebar{width:100%;height:auto;position:relative;}body{margin-left:0 !important;}}
</style>
</head>
<body><div class="sidebar">
<div><h2>CBTIS 199</h2><p>ASISTENCIAS</p><nav>
<a href="index.html">📋 Justificantes</a>
<a href="historial.html">📜 Historial por Grupo</a>
<a href="#">📤 Exportar CSV</a>
<a href="configuracion.html">⚙️ Panel Docente</a>
</nav></div>
</div>
<div class="config-card">
    <button class="btn-volver" id="volverBtn">← Volver al Dashboard</button>
    <h1>⚙️ Configuración del Sistema</h1>
    
    <div class="grupo">
        <label>🏫 Nombre de la Institución</label>
        <input type="text" id="institucionNombre" value="CENTRO DE BACHILLERATO TECNOLÓGICO INDUSTRIAL Y DE SERVICIOS No. 199">
    </div>
    
    <div class="grupo">
        <label>📧 Correo para notificaciones (copia)</label>
        <input type="email" id="correoCopia" placeholder="servicios.escolares@cbtis199.edu.mx">
    </div>
    
    <div class="grupo">
        <label>📅 Días máximos por defecto para justificantes</label>
        <input type="number" id="diasMaxGlobal" value="15">
    </div>
    
    <div class="grupo">
        <label>🔔 Notificaciones automáticas</label>
        <div class="checkbox-group">
            <label><input type="checkbox" id="notifAprobar" checked> Al Aprobar</label>
            <label><input type="checkbox" id="notifRechazar" checked> Al Rechazar</label>
            <label><input type="checkbox" id="notifTutor"> Al Tutor</label>
        </div>
    </div>
    
    <hr>
    <h3>📌 Tipos de Justificante (Personalizables)</h3>
    <div id="tiposContainer" class="tipos-lista"></div>
    <button class="btn-agregar" id="agregarTipoBtn">+ Agregar nuevo tipo</button>
    
    <button class="btn-guardar" id="guardarConfigBtn">💾 Guardar Configuración</button>
</div>

<script src="api.js"></script>
<script>
    let tiposJustificante = [
        { id: 1, nombre: "Justificante médico", maxDias: 15, activo: true },
        { id: 2, nombre: "Permiso particular", maxDias: 3, activo: true },
        { id: 3, nombre: "Actividad escolar", maxDias: 5, activo: true },
        { id: 4, nombre: "Representación deportiva", maxDias: 10, activo: true }
    ];
    
    function cargarConfiguracion() {
        const stored = localStorage.getItem('configGlobalJustificantes');
        if(stored) {
            let config = JSON.parse(stored);
            document.getElementById('institucionNombre').value = config.institucion || '';
            document.getElementById('correoCopia').value = config.correoCopia || '';
            document.getElementById('diasMaxGlobal').value = config.diasMaxGlobal || 15;
            document.getElementById('notifAprobar').checked = config.notifAprobar !== false;
            document.getElementById('notifRechazar').checked = config.notifRechazar !== false;
            document.getElementById('notifTutor').checked = config.notifTutor || false;
            if(config.tiposJustificante) tiposJustificante = config.tiposJustificante;
        }
        renderizarTipos();
    }
    
    function renderizarTipos() {
        const container = document.getElementById('tiposContainer');
        container.innerHTML = tiposJustificante.map(t => `
            <div class="tipo-item" data-id="${t.id}">
                <input type="text" value="${t.nombre}" style="width: 200px; border-radius:12px;" class="tipo-nombre" data-id="${t.id}">
                <input type="number" value="${t.maxDias}" style="width: 80px; border-radius:12px;" class="tipo-dias" data-id="${t.id}"> días máx
                <label><input type="checkbox" class="tipo-activo" ${t.activo ? 'checked' : ''} data-id="${t.id}> Activo</label>
                <button class="btn-eliminar" data-id="${t.id}">🗑️</button>
            </div>
        `).join('');
        
        document.querySelectorAll('.btn-eliminar').forEach(btn => {
            btn.addEventListener('click', () => {
                let id = parseInt(btn.dataset.id);
                tiposJustificante = tiposJustificante.filter(t => t.id !== id);
                renderizarTipos();
            });
        });
        
        document.querySelectorAll('.tipo-nombre').forEach(inp => {
            inp.addEventListener('change', () => {
                let id = parseInt(inp.dataset.id);
                let tipo = tiposJustificante.find(t => t.id === id);
                if(tipo) tipo.nombre = inp.value;
            });
        });
        
        document.querySelectorAll('.tipo-dias').forEach(inp => {
            inp.addEventListener('change', () => {
                let id = parseInt(inp.dataset.id);
                let tipo = tiposJustificante.find(t => t.id === id);
                if(tipo) tipo.maxDias = parseInt(inp.value);
            });
        });
    }
    
    function guardarConfiguracion() {
        const config = {
            institucion: document.getElementById('institucionNombre').value,
            correoCopia: document.getElementById('correoCopia').value,
            diasMaxGlobal: parseInt(document.getElementById('diasMaxGlobal').value),
            notifAprobar: document.getElementById('notifAprobar').checked,
            notifRechazar: document.getElementById('notifRechazar').checked,
            notifTutor: document.getElementById('notifTutor').checked,
            tiposJustificante: tiposJustificante
        };
        localStorage.setItem('configGlobalJustificantes', JSON.stringify(config));
        mostrarNotificacion('✅ Configuración guardada correctamente', 'success');
    }
    
    document.getElementById('agregarTipoBtn').addEventListener('click', () => {
        tiposJustificante.push({ id: Date.now(), nombre: "Nuevo tipo", maxDias: 1, activo: true });
        renderizarTipos();
    });
    
    document.getElementById('guardarConfigBtn').addEventListener('click', guardarConfiguracion);
    document.getElementById('volverBtn').addEventListener('click', () => window.location.href = 'index.html');
    
    cargarConfiguracion();
</script>
</body>
</html>
