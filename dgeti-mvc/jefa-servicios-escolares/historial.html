<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Permisos Firmados - Servicios Escolares</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/historial.css">
    <link rel="stylesheet" href="css/componentes.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <img src="assets/cbtis199-logoytexto.png" alt="CBTIS 199" class="logo">
            <h1>Servicios Escolares</h1>
        </div>
        <div class="header-right">
            <span class="rol-badge">Jefa de Servicios Escolares</span>
            <div class="user-info">
                <span class="user-name">María González</span>
                <div class="user-avatar">MG</div>
            </div>
            <button class="logout-btn" id="logoutBtn">🚪 Salir</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="historial-container">

        <div class="historial-header">
            <h1>
                <span>📄</span>
                Historial de Permisos Firmados
            </h1>
            <div class="historial-actions">
                <button class="btn-volver" id="volverBtn">← Volver al Dashboard</button>
                <button class="btn-exportar" id="exportarBtn">📊 Exportar a Excel</button>
            </div>
        </div>

        <!-- Tarjetas de resumen -->
        <div class="resumen-tarjetas">
            <div class="resumen-card">
                <h4>Total de permisos</h4>
                <p class="numero" id="totalPermisos">0</p>
            </div>
            <div class="resumen-card">
                <h4>Este mes</h4>
                <p class="numero" id="permisosMes">0</p>
            </div>
            <div class="resumen-card">
                <h4>Esta semana</h4>
                <p class="numero" id="permisosSemana">0</p>
            </div>
            <div class="resumen-card">
                <h4>Docentes</h4>
                <p class="numero" id="permisosDocentes">0</p>
            </div>
            <div class="resumen-card">
                <h4>Administrativos</h4>
                <p class="numero" id="permisosAdmin">0</p>
            </div>
        </div>

        <!-- Filtros -->
        <input type="text" id="searchInput" placeholder="Buscar...">
        <input type="date" id="fechaDesde">
        <input type="date" id="fechaHasta">
        <select id="rolFiltro">
            <option value="todos">Todos</option>
            <option value="docente">Docente</option>
            <option value="administrativo">Administrativo</option>
        </select>
        <button id="buscarBtn">Buscar</button>
        <button id="exportarBtn">Exportar</button>

        <!-- Tabla -->
        <table class="historial-table">
            <thead>...</thead>
            <tbody id="historialBody"></tbody>
        </table>
        <div id="paginacion"></div>
        <!-- Tabla de historial -->
        <div class="historial-table-container">
            <table class="historial-table">
                <thead>
                    <tr>
                        <th>Folio</th>
                        <th>Fecha emisión</th>
                        <th>Solicitante</th>
                        <th>Rol</th>
                        <th>Departamento</th>
                        <th>Periodo autorizado</th>
                        <th>Días</th>
                        <th>Documento</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="historialBody">
                    <!-- Datos cargados por JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Paginación -->
        <div class="paginacion" id="paginacion"></div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/historial.js"></script>
</body>

</html>
