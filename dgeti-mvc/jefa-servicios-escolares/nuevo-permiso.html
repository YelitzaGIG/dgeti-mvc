<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Permiso - Servicios Escolares</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/componentes.css">
</head>

<body>

    <header class="header">
        <div class="header-left">
            <img src="assets/cbtis199-logoytexto.png" alt="CBTIS 199" class="logo">
            <h1>Servicios Escolares</h1>
        </div>
        <div class="header-right">
            <span class="rol-badge">Jefa de Servicios Escolares</span>
            <div class="user-info">
                <span class="user-name">María González</span>
                <div class="user-avatar">MG</div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="form-container"
            style="max-width: 700px; margin: 2rem auto; background: white; border-radius: 16px; padding: 2rem;">
            <h1 style="color: #4E232E; margin-bottom: 1.5rem;">➕ Nuevo Permiso</h1>

            <form id="nuevoPermisoForm" enctype="multipart/form-data">
                <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1.2rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>👤 Solicitante *</label>
                        <select id="id_usuario" name="id_usuario" class="filtro-select" style="width: 100%;" required>
                            <option value="">Seleccionar...</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>📋 Tipo de personal *</label>
                        <select id="tipo_personal" name="tipo_personal" class="filtro-select" style="width: 100%;"
                            required>
                            <option value="">Seleccionar...</option>
                            <option value="docente">Docente</option>
                            <option value="administrativo">Administrativo</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.2rem;">
                    <label>📝 Tipo de permiso *</label>
                    <select id="tipo_permiso" name="tipo_permiso" class="filtro-select" style="width: 100%;" required>
                        <option value="">Seleccionar...</option>
                        <option value="licencia_medica">Licencia médica</option>
                        <option value="permiso_particular">Permiso particular</option>
                        <option value="capacitacion">Capacitación</option>
                        <option value="comision_oficial">Comisión oficial</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 1.2rem;">
                    <label>📖 Motivo *</label>
                    <textarea id="motivo" name="motivo" rows="3" class="filtro-fecha" style="width: 100%;"
                        placeholder="Describa el motivo del permiso..." required></textarea>
                </div>

                <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1.2rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>📅 Fecha inicio *</label>
                        <input type="date" id="fecha_inicio" name="fecha_inicio" class="filtro-fecha"
                            style="width: 100%;" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>📅 Fecha fin *</label>
                        <input type="date" id="fecha_fin" name="fecha_fin" class="filtro-fecha" style="width: 100%;"
                            required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>📎 Comprobante (PDF, JPG, PNG - máx 5MB)</label>
                    <input type="file" id="archivo" name="archivo" accept=".pdf,.jpg,.jpeg,.png" class="filtro-fecha"
                        style="width: 100%; padding: 0.5rem;">
                    <small style="color: #B38E5D;">Formatos permitidos: PDF, JPG, PNG. Tamaño máximo: 5MB</small>
                </div>

                <button type="submit" class="btn-submit"
                    style="background: #9D2449; color: white; border: none; padding: 0.8rem; width: 100%; border-radius: 8px; cursor: pointer; font-size: 1rem;">✅
                    Guardar Permiso</button>
                <button type="button" class="btn-cancelar" id="cancelarBtn"
                    style="background: #f0f0f0; color: #4E232E; border: none; padding: 0.8rem; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 1rem;">←
                    Cancelar</button>
            </form>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        const API_URL = 'http://localhost/Integrador/jefa-servicios-escolares/backend/api';

        document.addEventListener('DOMContentLoaded', () => {
            cargarUsuarios();
            inicializarEventos();
        });

        async function cargarUsuarios() {
            try {
                const respuesta = await fetch(`${API_URL}/usuarios/listar.php`);
                const usuarios = await respuesta.json();
                const select = document.getElementById('id_usuario');
                usuarios.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.id_usuario;
                    option.textContent = `${user.nombre} ${user.apellido} - ${user.nombre_rol}`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function inicializarEventos() {
            document.getElementById('nuevoPermisoForm').addEventListener('submit', guardarPermiso);
            document.getElementById('cancelarBtn').addEventListener('click', () => window.location.href = 'index.html');

            document.getElementById('fecha_inicio').addEventListener('change', validarFechas);
            document.getElementById('fecha_fin').addEventListener('change', validarFechas);
        }

        function validarFechas() {
            const inicio = document.getElementById('fecha_inicio').value;
            const fin = document.getElementById('fecha_fin').value;
            if (inicio && fin && new Date(fin) < new Date(inicio)) {
                alert('La fecha fin no puede ser menor a la fecha inicio');
                document.getElementById('fecha_fin').value = '';
            }
        }

        async function guardarPermiso(e) {
            e.preventDefault();

            // Obtener valores
            const id_usuario = document.getElementById('id_usuario').value;
            const tipo_personal = document.getElementById('tipo_personal').value;
            const tipo_permiso = document.getElementById('tipo_permiso').value;
            const motivo = document.getElementById('motivo').value;
            const fecha_inicio = document.getElementById('fecha_inicio').value;
            const fecha_fin = document.getElementById('fecha_fin').value;

            // Validar campos
            if (!id_usuario || !tipo_personal || !tipo_permiso || !motivo || !fecha_inicio || !fecha_fin) {
                alert('Por favor complete todos los campos');
                return;
            }

            // Crear FormData
            const formData = new FormData();
            formData.append('id_usuario', id_usuario);
            formData.append('tipo_personal', tipo_personal);
            formData.append('tipo_permiso', tipo_permiso);
            formData.append('motivo', motivo);
            formData.append('fecha_inicio', fecha_inicio);
            formData.append('fecha_fin', fecha_fin);

            // Agregar archivo si existe
            const archivoInput = document.getElementById('archivo');
            if (archivoInput && archivoInput.files.length > 0) {
                formData.append('archivo', archivoInput.files[0]);
                console.log('Archivo agregado:', archivoInput.files[0].name);
            }

            // Debug: mostrar lo que se envía
            for (let pair of formData.entries()) {
                console.log(pair[0] + ': ' + pair[1]);
            }

            try {
                const respuesta = await fetch('http://localhost/Integrador/jefa-servicios-escolares/backend/api/permisos/crear.php', {
                    method: 'POST',
                    body: formData
                });

                const result = await respuesta.json();
                console.log('Respuesta:', result);

                if (result.success) {
                    alert('✅ Permiso creado correctamente');
                    window.location.href = 'index.html';
                } else {
                    alert('❌ Error: ' + result.error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error al guardar el permiso');
            }
        }


        function mostrarNotificacion(mensaje, tipo) {
            const toast = document.createElement('div');
            toast.className = `toast-notification ${tipo}`;
            toast.textContent = mensaje;
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${tipo === 'success' ? '#27ae60' : '#e74c3c'};
                color: white;
                padding: 0.8rem 1.2rem;
                border-radius: 8px;
                z-index: 2000;
                animation: fadeInOut 3s ease;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>

</html>
